services:
  mongodb:
    image: mongo:latest
    container_name: sweetie-mongo
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - sweetie

  backend:
    build: ./backend
    container_name: sweetie-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - sweetie

  frontend:
    build: ./frontend
    container_name: sweetie-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:3000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    restart: unless-stopped
    networks:
      - sweetie

networks:
  sweetie:
    driver: bridge

volumes:
  mongo-data: